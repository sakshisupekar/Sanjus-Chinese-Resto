<h1 class="text-center display-4">Orders</h1>
<table class="table table-bordered">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Email</th>
      <th scope="col">Meassage</th>
      
      
    </tr>
  </thead>
  <tbody>
    <tr *ngFor=" let o of oarr">
      <td>{{o.id}}</td>
      <td>{{o.name}}</td>
      <td>{{o.email}}</td>
      <td>{{o.message}}</td>
      
    </tr>
  </tbody>
  
</table>
