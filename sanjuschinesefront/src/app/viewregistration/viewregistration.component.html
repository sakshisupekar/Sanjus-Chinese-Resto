<h1 class="text-center display-4">Orders</h1>
<table class="table table-bordered">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Age</th>
      <th scope="col">Gender</th>
      <th scope="col">Contact</th>
      <th scope="col">Address</th>
      <th scope="col">City</th>
      <th scope="col">Email</th>
      <th scope="col">Password</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor=" let o of oarr">
      <td>{{o.regid}}</td>
      <td>{{o.name}}</td>
      <td>{{o.age}}</td>
      <td>{{o.gender}}</td>
      <td>{{o.contact}}</td>
      <td>{{o.address}}</td>
      <td>{{o.city}}</td>
      <td>{{o.emailid}}</td>
      <td>{{o.password}}</td>
    </tr>
  </tbody>
  
</table>
